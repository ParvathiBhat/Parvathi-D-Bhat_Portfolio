<svg xmlns="http://www.w3.org/2000/svg"
viewBox="0 0 500 400">

<style>

.screen{
fill:#1E293B;
}

.keyboard{
fill:#CBD5E1;
}

.frame{
fill:#475569;
}

.line{
stroke:#14B8A6;
stroke-width:3;
stroke-linecap:round;
animation:typing 3s infinite;
}

.dna1{
stroke:#38BDF8;
stroke-width:4;
fill:none;
animation:twist 5s infinite ease-in-out;
}

.dna2{
stroke:#14B8A6;
stroke-width:4;
fill:none;
animation:twist2 5s infinite ease-in-out;
}

.rung{
stroke:#94A3B8;
stroke-width:2;
}

.crispr{
stroke:#F97316;
stroke-width:3;
fill:none;
animation:pulse 3s infinite;
}

@keyframes typing{

0%,100%{
opacity:.4;
}

50%{
opacity:1;
}

}

@keyframes pulse{

0%,100%{
transform:scale(1);
}

50%{
transform:scale(1.08);
}

}

@keyframes twist{

0%{
transform:translateX(0);
}

50%{
transform:translateX(5px);
}

100%{
transform:translateX(0);
}

}

@keyframes twist2{

0%{
transform:translateX(0);
}

50%{
transform:translateX(-5px);
}

100%{
transform:translateX(0);
}

}

</style>

<!-- Screen -->

<rect
x="70"
y="40"
width="320"
height="220"
rx="18"
class="frame"/>

<rect
x="85"
y="55"
width="290"
height="190"
rx="10"
class="screen"/>

<!-- DNA -->

<path
d="M150 80
C180 100 180 130 150 150
C120 170 120 200 150 220"

class="dna1"/>

<path
d="M200 80
C170 100 170 130 200 150
C230 170 230 200 200 220"

class="dna2"/>

<line x1="155" y1="95" x2="195" y2="95" class="rung"/>
<line x1="150" y1="125" x2="200" y2="125" class="rung"/>
<line x1="145" y1="155" x2="205" y2="155" class="rung"/>
<line x1="150" y1="185" x2="200" y2="185" class="rung"/>

<!-- Code -->

<line x1="245" y1="90" x2="340" y2="90" class="line"/>
<line x1="245" y1="115" x2="320" y2="115" class="line"/>
<line x1="245" y1="140" x2="345" y2="140" class="line"/>
<line x1="245" y1="165" x2="310" y2="165" class="line"/>
<line x1="245" y1="190" x2="330" y2="190" class="line"/>

<!-- CRISPR -->

<path
d="M285 215
L310 190"

class="crispr"/>

<path
d="M285 190
L310 215"

class="crispr"/>

<circle
cx="285"
cy="190"
r="4"
fill="#F97316"/>

<circle
cx="310"
cy="215"
r="4"
fill="#F97316"/>

<!-- Base -->

<path
d="
M45 270
L415 270
L450 310
L10 310
Z"

class="keyboard"/>

<rect
x="180"
y="282"
width="80"
height="8"
rx="4"
fill="#94A3B8"/>

</svg>

